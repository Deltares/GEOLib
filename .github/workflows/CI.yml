name: ci

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  CI:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-22.04, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4.1.0
        with:
          fetch-depth: 0

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.8.0

      - name: Cache Pixi
        uses: actions/cache@v3
        with:
          path: ~/.cache/pixi
          key: pixi-${{ runner.os }}-${{ hashFiles('**/pixi.lock') }}
          restore-keys: |
            pixi-${{ runner.os }}-

      - name: Install Dependencies
        run: pixi install

      - name: Test with pytest
        run: >
          pixi run pytest
          --cov=geolib
          --cov-report xml:coverage-reports/coverage-hydrolib-core.xml
          --junitxml=xunit-reports/xunit-result-hydrolib-core.xml
          -m "unittest and not workinprogress"